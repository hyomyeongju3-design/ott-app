<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart OTT Search</title>
<link rel="manifest" href="manifest.json">
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  color:white;
  text-align:center;
  background-size:cover;
  background-position:center;
  transition: background 0.5s ease;
}
#overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  backdrop-filter: blur(20px);
  z-index:-1;
}
header {
  padding:20px;
  font-size:28px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-shadow:1px 1px 6px black;
}
#homeBtn {
  background: rgba(255,255,255,0.2);
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}
#search-container {
  margin-top:10px;
  display:flex;
  justify-content:center;
  align-items:center;
}
#search {
  padding:12px;
  width:300px;
  border:none;
  border-radius:20px;
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.3);
  color:black;
  font-size:16px;
  margin-right:8px;
}
button {
  padding:12px;
  border:none;
  border-radius:20px;
  background:#e50914;
  color:white;
  cursor:pointer;
}
#result {
  margin-top:20px;
  background: rgba(0,0,0,0.5);
  padding:20px;
  border-radius:20px;
  display:inline-block;
  max-width:400px;
}
.poster { width:180px; border-radius:12px; margin-top:10px; box-shadow:0 0 15px black; }
.ott {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:20px;
}
.ott div {
  margin:10px;
  padding:10px;
  background: rgba(28,28,28,0.8);
  border-radius:12px;
  cursor:pointer;
  width:100px;
  text-align:center;
}
.section { margin-top:30px; }
.rec { display:flex; overflow-x:auto; padding:10px; }
.rec img { width:120px; margin:10px; border-radius:10px; cursor:pointer; box-shadow:0 0 10px black; }
h2.section-title { text-align:left; margin-left:20px; }
</style>
</head>
<body>
<div id="overlay"></div>
<header>
  Smart OTT Search
  <button id="homeBtn" onclick="goHome()">홈</button>
</header>
<div id="search-container">
  <input id="search" placeholder="영화 / 드라마 검색">
  <button onclick="searchMovie()">검색</button>
</div>

<div class="section">
  <h2 class="section-title">검색 결과</h2>
  <div id="result"></div>
</div>
<div class="section">
  <h2 class="section-title">AI 추천</h2>
  <div class="rec" id="aiRec"></div>
</div>

<script>
const API_KEY="5369e70114a79b809d50c4075c60e7ac";

const aiPopularMovies = [
  {title:"범죄도시", providers:["Coupang Play","Wavve"], poster:"https://image.tmdb.org/t/p/w500/2FzOEg1nGZjJK5vAaCVS0lbp6rL.jpg"},
  {title:"킹덤", providers:["Netflix"], poster:"https://image.tmdb.org/t/p/w500/7jp6Lq0IZhf6S2XqqX34p6Xzhvb.jpg"},
  {title:"승리호", providers:["Netflix"], poster:"https://image.tmdb.org/t/p/w500/4JvUml8A56kRky90ydm6r8c9JXf.jpg"},
  {title:"오징어 게임", providers:["Netflix"], poster:"https://image.tmdb.org/t/p/w500/qgmiHYRz3xYijORrZpL5J0jtiMu.jpg"},
  {title:"이터널스", providers:["Wavve"], poster:"https://image.tmdb.org/t/p/w500/6GoZd1lUMCk8wev5CBwItMeXr1N.jpg"}
];

window.onload = ()=>{
  loadAIRecommendations();
};

document.getElementById("search").addEventListener("keypress",e=>{
  if(e.key==="Enter") searchMovie();
});

function goHome(){
  document.getElementById("result").innerHTML="";
  document.getElementById("overlay").style.background="";
  document.getElementById("search").value="";
  loadAIRecommendations();
}

function loadAIRecommendations(){
  const container = document.getElementById("aiRec");
  container.innerHTML = aiPopularMovies.map(m=>`
    <div onclick="searchAgain('${m.title}')">
      <img src="${m.poster}">
      <p>${m.title}</p>
    </div>
  `).join('');
}

function searchAgain(title){
  document.getElementById("search").value = title;
  searchMovie();
}

async function searchMovie(){
  const query=document.getElementById("search").value.trim();
  if(!query) return;
  document.getElementById("result").innerHTML="로딩중...";
  try{
    const res=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=ko-KR`);
    const data=await res.json();
    if(!data.results || data.results.length===0){
      document.getElementById("result").innerHTML="결과 없음"; return;
    }
    const item=data.results.find(x=>x.media_type==="movie"||x.media_type==="tv");
    if(!item){ document.getElementById("result").innerHTML="지원 안됨"; return; }
    const title=item.title||item.name;
    const poster=item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : "";
    if(item.backdrop_path){
      document.getElementById("overlay").style.background=`url(https://image.tmdb.org/t/p/original${item.backdrop_path}) no-repeat center / cover`;
    }

    const providerData = aiPopularMovies.find(m=>m.title === title)?.providers || [];
    document.getElementById("result").innerHTML=`
      <h2>${title}</h2>
      <img class="poster" src="${poster}">
      <div class="ott">
        ${providerData.map(p=>`<div onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(title)}+${p}')">${p}</div>`).join('')}
      </div>
    `;
  }catch(err){
    console.error(err);
    document.getElementById("result").innerHTML="오류 발생";
  }
}
</script>
</body>
</html>
