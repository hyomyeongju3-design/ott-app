<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart OTT Search</title>
<link rel="manifest" href="manifest.json">
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  color:white;
  text-align:center;
  background-size:cover;
  background-position:center;
  transition: background 0.5s ease;
}
#overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  backdrop-filter: blur(20px);
  z-index:-1;
}
header {
  padding:20px;
  font-size:28px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-shadow:1px 1px 6px black;
}
#homeBtn {
  background: rgba(255,255,255,0.2);
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}
#search-container {
  margin-top:10px;
  display:flex;
  justify-content:center;
  align-items:center;
}
#search {
  padding:12px;
  width:300px;
  border:none;
  border-radius:20px;
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.3);
  color:black;
  font-size:16px;
  margin-right:8px;
}
button {
  padding:12px;
  border:none;
  border-radius:20px;
  background:#e50914;
  color:white;
  cursor:pointer;
}
.result-item {
  background: rgba(0,0,0,0.5);
  padding:20px;
  border-radius:20px;
  display:inline-block;
  margin:20px;
  max-width:300px;
}
.poster { width:180px; border-radius:12px; margin-top:10px; box-shadow:0 0 15px black; }
.ott {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:10px;
}
.ott div {
  margin:5px;
  padding:10px;
  background: rgba(28,28,28,0.8);
  border-radius:12px;
  cursor:pointer;
  width:100px;
  text-align:center;
  font-size:14px;
}
.section { margin-top:30px; }
.rec { display:flex; overflow-x:auto; padding:10px; }
.rec img { width:120px; margin:10px; border-radius:10px; cursor:pointer; box-shadow:0 0 10px black; }
h2.section-title { text-align:left; margin-left:20px; }
</style>
</head>
<body>
<div id="overlay"></div>
<header>
  Smart OTT Search
  <button id="homeBtn" onclick="goHome()">홈</button>
</header>
<div id="search-container">
  <input id="search" placeholder="영화 / 드라마 검색">
  <button onclick="searchMovie()">검색</button>
</div>

<div class="section">
  <h2 class="section-title">검색 결과</h2>
  <div id="result"></div>
</div>
<div class="section">
  <h2 class="section-title">AI 추천</h2>
  <div class="rec" id="aiRec"></div>
</div>

<script>
const API_KEY="5369e70114a79b809d50c4075c60e7ac";

// OTT 매핑
const ottMap = {
  "범죄도시":["Coupang Play","Wavve"],
  "킹덤":["Netflix"],
  "승리호":["Netflix"],
  "오징어 게임":["Netflix"],
  "이터널스":["Wavve"],
  "기생충":["Netflix","Watcha"],
  "신과함께":["Coupang Play","TVING"],
  "라라랜드":["Netflix"],
  "어벤져스":["Disney+"],
  "인셉션":["Netflix","Watcha"]
};
const ottLinks = {
  "Netflix":"https://www.netflix.com/search?q=",
  "Wavve":"https://www.wavve.com/search?keyword=",
  "Coupang Play":"https://www.coupangplay.com/search?keyword=",
  "TVING":"https://www.tving.com/search?q=",
  "Watcha":"https://watcha.com/search?q=",
  "Disney+":"https://www.disneyplus.com/search?q="
};
const aiPopularMovies = Object.keys(ottMap);

window.onload = ()=>{ loadAIRecommendations(); };

document.getElementById("search").addEventListener("keypress",e=>{
  if(e.key==="Enter") searchMovie();
});

function goHome(){
  document.getElementById("result").innerHTML="";
  document.getElementById("overlay").style.background="";
  document.getElementById("search").value="";
  loadAIRecommendations();
}

// AI 추천
function loadAIRecommendations(){
  const container = document.getElementById("aiRec");
  const shuffled = aiPopularMovies.sort(()=>0.5-Math.random());
  container.innerHTML = shuffled.slice(0,10).map(title=>{
    const poster = `https://image.tmdb.org/t/p/w500${getPosterPath(title)}`;
    return `<div onclick="searchAgain('${title}')"><img src="${poster}"><p>${title}</p></div>`;
  }).join('');
}

function searchAgain(title){
  document.getElementById("search").value = title;
  searchMovie();
}

function getPosterPath(title){
  const map = {
    "범죄도시":"/2FzOEg1nGZjJK5vAaCVS0lbp6rL.jpg",
    "킹덤":"/7jp6Lq0IZhf6S2XqqX34p6Xzhvb.jpg",
    "승리호":"/4JvUml8A56kRky90ydm6r8c9JXf.jpg",
    "오징어 게임":"/qgmiHYRz3xY3pDQ2m5TkqU9FG9j.jpg",
    "이터널스":"/6GoZd1lUMCk8wev5CBwItMeXr1N.jpg",
    "기생충":"/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg",
    "신과함께":"/kN9uDHRD8gIsY4o4Qq4R1GgwrvA.jpg",
    "라라랜드":"/2d2qWqqfR6G6KxVgRLoFQXg0apS.jpg",
    "어벤져스":"/or06FN3Dka5tukK1e9sl16pB3iy.jpg",
    "인셉션":"/qOa9YmIQxY3pDQ2m5TkqU9FG9j.jpg"
  };
  return map[title] || "";
}

// 검색
async function searchMovie(){
  const query=document.getElementById("search").value.trim();
  if(!query) return;
  document.getElementById("result").innerHTML="로딩중...";
  try{
    const res=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=ko-KR`);
    const data=await res.json();
    if(!data.results || data.results.length===0){ document.getElementById("result").innerHTML="결과 없음"; return; }

    const resultsDiv = document.getElementById("result");
    resultsDiv.innerHTML = "";

    for(const item of data.results){
      if(item.media_type!=="movie" && item.media_type!=="tv") continue;
      const title=item.title||item.name;
      const poster=item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : getPosterPath(title);

      if(item.backdrop_path){
        document.getElementById("overlay").style.background=`url(https://image.tmdb.org/t/p/original${item.backdrop_path}) no-repeat center / cover`;
      }

      const providers = ottMap[title] || [];
      const ottHtml = providers.map(p=>`<div onclick="window.open('${ottLinks[p]}${encodeURIComponent(title)}')">${p}</div>`).join('');

      resultsDiv.innerHTML += `
        <div class="result-item">
          <h2>${title}</h2>
          <img class="poster" src="${poster}">
          <div class="ott">${ottHtml || "OTT 정보 없음"}</div>
        </div>
      `;
    }
  }catch(err){ console.error(err); document.getElementById("result").innerHTML="오류 발생"; }
}
</script>
</body>
</html>
